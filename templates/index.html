<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Target Sprint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#0f172a",
              mist: "#e2e8f0",
              gold: "#f59e0b",
              teal: "#14b8a6",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top,_rgba(20,184,166,0.18),_transparent_35%),radial-gradient(circle_at_bottom_right,_rgba(245,158,11,0.16),_transparent_30%)]"></div>

    <main class="mx-auto flex min-h-screen max-w-6xl items-center px-4 py-8 sm:px-6 lg:px-8">
      <section class="grid w-full gap-6 lg:grid-cols-[1.2fr_0.8fr]">
        <div class="rounded-3xl border border-white/10 bg-white/5 p-6 shadow-2xl shadow-black/30 backdrop-blur md:p-8">
          <div class="mb-6 flex items-center justify-between gap-4">
            <div>
              <p class="text-sm uppercase tracking-[0.35em] text-teal-300">Mini Game</p>
              <h1 class="mt-2 text-3xl font-bold sm:text-4xl">Target Sprint</h1>
            </div>
            <div class="rounded-2xl border border-white/10 bg-slate-900/70 px-4 py-3 text-right">
              <p class="text-xs uppercase tracking-[0.3em] text-slate-400">Time Left</p>
              <p id="timer" class="text-2xl font-semibold text-gold">{{ game_duration }}</p>
            </div>
          </div>

          <div class="mb-6 grid gap-3 sm:grid-cols-3">
            <div class="rounded-2xl border border-white/10 bg-slate-900/60 p-4">
              <p class="text-xs uppercase tracking-[0.25em] text-slate-400">Score</p>
              <p id="score" class="mt-2 text-3xl font-bold">0</p>
            </div>
            <div class="rounded-2xl border border-white/10 bg-slate-900/60 p-4">
              <p class="text-xs uppercase tracking-[0.25em] text-slate-400">Best</p>
              <p id="bestScore" class="mt-2 text-3xl font-bold">0</p>
            </div>
            <div class="rounded-2xl border border-white/10 bg-slate-900/60 p-4">
              <p class="text-xs uppercase tracking-[0.25em] text-slate-400">Status</p>
              <p id="status" class="mt-2 text-lg font-medium text-slate-200">Ready to play</p>
            </div>
          </div>

          <div class="mb-6 flex flex-col gap-3 sm:flex-row">
            <input
              id="playerName"
              type="text"
              maxlength="20"
              value="Player"
              class="w-full rounded-2xl border border-white/10 bg-slate-950/70 px-4 py-3 text-slate-100 outline-none ring-0 placeholder:text-slate-500 focus:border-teal-400"
              placeholder="Enter your name"
            />
            <button
              id="startButton"
              class="rounded-2xl bg-teal-500 px-5 py-3 font-semibold text-slate-950 transition hover:bg-teal-400 disabled:cursor-not-allowed disabled:bg-slate-500"
            >
              Start Game
            </button>
          </div>

          <div class="rounded-[2rem] border border-white/10 bg-slate-950/70 p-4 shadow-inner shadow-black/20">
            <div
              id="playfield"
              class="relative h-[420px] overflow-hidden rounded-[1.5rem] border border-dashed border-white/10 bg-gradient-to-br from-slate-900 via-slate-950 to-slate-900"
            >
              <div class="pointer-events-none absolute inset-0 bg-[linear-gradient(to_right,rgba(255,255,255,0.04)_1px,transparent_1px),linear-gradient(to_bottom,rgba(255,255,255,0.04)_1px,transparent_1px)] bg-[size:48px_48px]"></div>
              <button
                id="target"
                class="absolute hidden h-16 w-16 rounded-full border-4 border-white bg-gold text-sm font-bold text-slate-950 shadow-lg shadow-black/30 transition-transform duration-100 ease-out hover:scale-105"
                aria-label="Target"
              >
                Tap
              </button>
            </div>
          </div>
        </div>

        <aside class="rounded-3xl border border-white/10 bg-slate-900/60 p-6 shadow-2xl shadow-black/20 backdrop-blur md:p-8">
          <h2 class="text-2xl font-bold">Leaderboard</h2>
          <p class="mt-2 text-sm text-slate-400">Top scores are stored by the Flask backend.</p>

          <ol id="leaderboard" class="mt-6 space-y-3"></ol>

          <div class="mt-8 rounded-2xl border border-white/10 bg-white/5 p-4 text-sm text-slate-300">
            <p class="font-semibold text-slate-100">How to play</p>
            <p class="mt-2 leading-6">Click Start Game, then hit the target as many times as you can before the timer reaches zero.</p>
          </div>
        </aside>
      </section>
    </main>

    <script>
      window.GAME_DURATION = {{ game_duration }};
    </script>
    <script src="{{ url_for('static', filename='game.js') }}"></script>
  </body>
</html>
